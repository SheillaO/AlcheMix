<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <title>AlcheMix</title>
</head>

<body>

    <header>
        <form id="color-form">
            <div class="input-group">
                <label for="color-picker">Seed Color</label>
                <input id="color-picker" type="color" value="#0047AB" aria-label="Choose seed color" />
            </div>

            <div class="input-group">
                <label for="scheme-select">Mode</label>
                <select id="scheme-select">
                    <option value="monochrome">Monochrome</option>
                    <option value="monochrome-dark">Monochrome-dark</option>
                    <option value="monochrome-light">Monochrome-light</option>
                    <option value="analogic">Analogic</option>
                    <option value="complement">Complement</option>
                    <option value="analogic-complement">Analogic-complement</option>
                    <option value="triad">Triad</option>
                    <option value="quad">Quad</option>
                </select>
            </div>

            <button type="submit">Generate</button>
            <button type="button" class="btn-secondary" onclick="copyAllAsTokens()">Copy CSS Tokens</button>


            <div class="input-group toggle-group">
                <label for="dark-mode-toggle">Night Mode</label>
                <input type="checkbox" id="dark-mode-toggle" role="switch" />
            </div>
        </form>
    </header>


    <main id="palette-container"></main>


    <div id="toast-notification" class="toast" role="status" aria-live="polite">Copied to clipboard!</div>

    <footer>
        <p>Built with ❤️ by Olga · <a href="https://github.com/SheillaO/AlcheMix" target="_blank">GitHub</a> · <a
                href="https://alchemixapp.netlify.app/" target="_blank">Netlify</a></p>
    </footer>

    <script src="index.js"></script>
</body>

</html>
